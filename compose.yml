services:
  backend:
    image: ${BETALAB_BACKEND_IMAGE:-registry.mmyumu.fr/betalab-backend:0.1.0}
    build:
      context: ./backend
    container_name: betalab-backend
    environment:
      BETALAB_EXPERIMENTS_DB_PATH: /data/experiments.sqlite3
      BETALAB_CORS_ALLOWED_ORIGINS: ${BETALAB_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    volumes:
      - betalab_backend_data:/data

  frontend:
    image: ${BETALAB_FRONTEND_IMAGE:-registry.mmyumu.fr/betalab-frontend:0.1.0}
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: betalab-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  betalab_backend_data:
